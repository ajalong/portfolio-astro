<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="2400" viewBox="0 0 1920 2400">
  <title>Static mesh (from former canvas/CSS radial stack on #f9f9fb)</title>
  <defs>
    <!-- 1: Bottom-right violet / lavender -->
    <radialGradient id="mesh-br" cx="100%" cy="100%" r="78%" fx="100%" fy="100%">
      <stop offset="0%" stop-color="hsl(268, 34%, 78%)" stop-opacity="0.72"/>
      <stop offset="32%" stop-color="hsl(278, 28%, 82%)" stop-opacity="0.48"/>
      <stop offset="58%" stop-color="hsl(288, 22%, 86%)" stop-opacity="0.28"/>
      <stop offset="80%" stop-color="hsl(295, 16%, 90%)" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="hsl(295, 16%, 90%)" stop-opacity="0"/>
    </radialGradient>
    <!-- 2: Bottom-left peach / sand -->
    <radialGradient id="mesh-bl" cx="0%" cy="100%" r="72%" fx="0%" fy="100%">
      <stop offset="0%" stop-color="hsl(24, 48%, 79%)" stop-opacity="0.64"/>
      <stop offset="34%" stop-color="hsl(20, 40%, 83%)" stop-opacity="0.42"/>
      <stop offset="62%" stop-color="hsl(16, 30%, 87%)" stop-opacity="0.22"/>
      <stop offset="84%" stop-color="hsl(12, 20%, 91%)" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="hsl(12, 20%, 91%)" stop-opacity="0"/>
    </radialGradient>
    <!-- 3: Top-right apricot / cream -->
    <radialGradient id="mesh-tr" cx="100%" cy="0%" r="58%" fx="100%" fy="0%">
      <stop offset="0%" stop-color="hsl(28, 38%, 82%)" stop-opacity="0.4"/>
      <stop offset="45%" stop-color="hsl(22, 30%, 86%)" stop-opacity="0.22"/>
      <stop offset="72%" stop-color="hsl(16, 22%, 90%)" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="hsl(16, 22%, 90%)" stop-opacity="0"/>
    </radialGradient>
    <!-- 4: Upper band grey-lilac -->
    <radialGradient id="mesh-top" cx="50%" cy="0%" r="85%" fx="50%" fy="0%">
      <stop offset="0%" stop-color="hsl(248, 22%, 86%)" stop-opacity="0.3"/>
      <stop offset="38%" stop-color="hsl(252, 18%, 90%)" stop-opacity="0.14"/>
      <stop offset="68%" stop-color="hsl(256, 14%, 93%)" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="hsl(256, 14%, 93%)" stop-opacity="0"/>
    </radialGradient>
    <!-- 5: Wide bottom wash indigo + warmth -->
    <radialGradient id="mesh-bottom" cx="52%" cy="115%" r="95%" fx="52%" fy="115%">
      <stop offset="0%" stop-color="hsl(262, 32%, 80%)" stop-opacity="0.38"/>
      <stop offset="28%" stop-color="hsl(268, 26%, 84%)" stop-opacity="0.22"/>
      <stop offset="52%" stop-color="hsl(28, 28%, 88%)" stop-opacity="0.12"/>
      <stop offset="78%" stop-color="hsl(256, 16%, 92%)" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="hsl(256, 16%, 92%)" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="#f9f9fb"/>
  <rect width="100%" height="100%" fill="url(#mesh-br)"/>
  <rect width="100%" height="100%" fill="url(#mesh-bl)"/>
  <rect width="100%" height="100%" fill="url(#mesh-tr)"/>
  <rect width="100%" height="100%" fill="url(#mesh-top)"/>
  <rect width="100%" height="100%" fill="url(#mesh-bottom)"/>
</svg>
